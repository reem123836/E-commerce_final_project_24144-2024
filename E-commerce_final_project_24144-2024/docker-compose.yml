version: '3.8'

services:
  # 1. عقدة خادم الويب والـ PHP (App Node)
  web:
    image: php:8.2-apache
    container_name: auratech_web_app
    ports:
      - "8080:80" # تشغيل المشروع على المنفذ 8080 (يمكنك تغييره إلى 80 إذا كان المنفذ شاغراً)
    volumes:
      - .:/var/www/html # ربط مجلد المشروع الحالي داخل الحاوية لتحديث الكود تلقائياً
    depends_on:
      - db # عدم تشغيل السيرفر إلا بعد تشغيل قاعدة البيانات أولاً
    networks:
      - auratech_network
    build:
      context: .
      dockerfile: Dockerfile # في حال كنت تستخدم Dockerfile مخصص لتثبيت mysqli

  # 2. عقدة قاعدة البيانات (Database Node)
  db:
    image: mysql:8.0
    container_name: auratech_db_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password # نفس كلمة المرور الموجودة في config.php
      MYSQL_DATABASE: laptop_agency_db   # نفس اسم قاعدة البيانات
    ports:
      - "3306:3306"
    volumes:
      - auratech_db_data:/var/lib/mysql # حفظ البيانات ممتدة حتى لو تم إيقاف الحاوية
    networks:
      - auratech_network

# شبكة داخلية معزولة لربط الحاويات ببعضها بأمان
networks:
  auratech_network:
    driver: bridge

# مساحة تخزين مستمرة لحفظ بيانات الـ SQL
volumes:
  auratech_db_data: