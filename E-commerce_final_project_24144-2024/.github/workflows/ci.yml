name: AuraTech Agency CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  php-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup PHP CLI Environment
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Scan PHP Syntax Errors
        run: |
          echo "Scanning AuraTech PHP repository files..."
          find . -name "*.php" -not -path "./vendor/*" -exec php -l {} \;

  docker-compile-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Validate Dockerfile Build
        run: |
          echo "Compiling AuraTech Docker image architecture..."
          docker build -t auratech-web-test:latest .