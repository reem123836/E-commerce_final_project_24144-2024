# تعريف المراحل الخاصة بالتكامل المستمر
stages:
  - lint
  - build

# 1. مرحلة فحص كود الـ PHP للتأكد من عدم وجود أخطاء في الصياغة (Syntax Errors)
php_lint_check:
  stage: lint
  image: php:8.2-cli
  script:
    - echo "Executing static analysis on AuraTech PHP repository..."
    - find . -name "*.php" -not -path "./vendor/*" -exec php -l {} \;

# 2. مرحلة اختبار بناء حاوية الدوكر (Docker Build Test)
docker_image_build:
  stage: build
  image: docker:24.0.7
  services:
    - docker:24.0.7-dind # استخدام خاصية Docker-in-Docker للبناء السحابي
  variables:
    DOCKER_TLS_CERTDIR: ""
  script:
    - echo "Validating AuraTech Docker deployment architecture..."
    - docker build -t auratech-web-test:latest .
    - echo "Docker matrix compilation completed successfully."