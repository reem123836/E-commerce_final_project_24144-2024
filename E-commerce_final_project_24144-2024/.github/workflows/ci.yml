name: AuraTech Continuous Integration

# تحديد متى يعمل الـ Action تلقائياً (عند أي Push أو Pull Request على فرع main)
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # 1. وظيفة فحص كود الـ PHP من الأخطاء الصياغية
  php-lint-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP Environment
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Execute PHP Lint
        run: |
          echo "Scanning AuraTech PHP source files for compilation errors..."
          find . -name "*.php" -not -path "./vendor/*" -exec php -l {} \;

  # 2. وظيفة اختبار بناء الحاوية (Docker Build) للتأكد من سلامة الـ Dockerfile
  docker-build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Validate Docker Compilation
        run: |
          echo "Testing integration parameters on AuraTech Dockerfile setup..."
          docker build -t auratech-web-test:latest .
          echo "Docker image built successfully without compilation faults."