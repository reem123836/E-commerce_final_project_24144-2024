name: AuraTech Agency CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup PHP CLI Environment
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Scan PHP Syntax Errors
        run: |
          find . -name "*.php" -not -path "./vendor/*" -exec php -l {} \;

      - name: Validate Dockerfile Build
        run: |
          docker build -t auratech-web-test:latest .