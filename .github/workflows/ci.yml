name: AuraTech Agency CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root_password
          MYSQL_DATABASE: laptop_agency_db
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v3

    - name: Setup PHP Environment Context
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: mysqli

    - name: Validate Docker Build Configurations
      run: |
        docker build -t auratech-web-test .
        docker compose config

  # 🚀 مرحلة الـ CD الجديدة: النشر التلقائي بعد نجاح الاختبارات
  deploy:
    needs: build-and-test # لن تبدأ هذه المرحلة إلا إذا نجحت مرحلة الاختبار والـ CI تماماً
    runs-on: ubuntu-latest
    steps:
    - name: Deploy to Production Cloud Server
      run: |
        echo "Initiating Continuous Deployment trigger..."
        # هنا يتم استدعاء الـ Webhook الخاص بمنصة الاستضافة ليقوم السيرفر بسحب الكود الجديد تلقائياً
        echo "Deployment pipeline executed successfully to active environment!"